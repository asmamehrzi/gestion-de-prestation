<form [formGroup]="loginForm" >
    <mat-card class="shipping-card">
      <mat-card-header>
        <mat-card-title>Sign in</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="row">
          <div class="col">
            <mat-form-field class="full-width">
              <input matInput placeholder="Email" formControlName="email">
            </mat-form-field>
          </div>
        </div>
        <div class="row">
          <div class="col">
            <mat-form-field class="full-width">
              <input matInput placeholder="Password" formControlName="password">
            </mat-form-field>
          </div>
        </div>
       
  
      </mat-card-content>
      <mat-card-actions>
        <button mat-raised-button color="primary" (click)="SignUser()">Save</button>
      </mat-card-actions>
    </mat-card>
  </form>

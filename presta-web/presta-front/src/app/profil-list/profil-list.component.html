<div class = "row">
  <h2> Profil List</h2>
</div>

<table class = "table table-striped table-bordered">
  <thead>
      <tr>
          <th>Name</th>
          <th>Description </th>
          <th> Actions </th>
      </tr>
  </thead>
  <tbody>
      <tr *ngFor = "let p of profils" >
          <td> {{ p.Name }} </td>
          <td> {{ p.Description }} </td>
          <td> {{ p.Description }}</td>
         <td> {{ p.Description }} </td>


      </tr>
  </tbody>
</table>
